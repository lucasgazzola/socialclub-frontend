server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta que no sea un archivo estático se resuelve con
    # index.html para que React Router tome el control del enrutamiento.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché agresiva para assets con hash en el nombre (generados por Vite).
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
